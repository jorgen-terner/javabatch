apiVersion: batch/v1
kind: Job
metadata:
  name: javabatch-dispatcher
spec:
  backoffLimit: 0
  template:
    spec:
      serviceAccountName: inf-batch-job-dispatcher
      restartPolicy: Never
      containers:
      - name: inf-batch-job-app
        image: your-registry/inf-batch-job-app:latest
        args:
        - --job-config
        - /config/examplejob.ini
        - --action
        - dispatch-script-job
        - --script-image
        - your-registry/javabatch-script:latest
        - --script-action
        - restart
        - --job-args
        - JOB_KEY=JOB_VALUE
        - --configmap-name
        - inf-batch-job-config
        - --endpoints-configmap-name
        - springbatch-endpoints
        - --endpoint-config-filename
        - examplejob.ini
        - --script-job-name-prefix
        - javabatch-script
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
        - name: TO_JOB_NAME
          value: "JAVABATCH_SAMPLE"
        - name: TO_ENV_NAME
          value: "BATCH-POC"
        volumeMounts:
        - name: batch-config
          mountPath: /config
          readOnly: true
        - name: app-config
          mountPath: /etc/configmaps/inf-batch-job-config
          readOnly: true
      volumes:
      - name: batch-config
        configMap:
          name: springbatch-endpoints
      - name: app-config
        configMap:
          name: inf-batch-job-config
